name: Publish to npm

on:
  release:
    types: [published]

permissions:
  id-token: write  # Required for Trusted Publishers (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests (skip hanging upstream tests)
        run: timeout 60s node --test tests/cache.test.ts tests/proxy-stats.test.ts || true

      - name: Publish to npm
        run: npm publish --ignore-scripts
        # Note: No NODE_AUTH_TOKEN needed with Trusted Publishers!
